<!DOCTYPE html>
<html>
    <head>
        <title>
            Home page
        </title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="headerfootermanager.js"></script>
        <script src="functions.js"></script>
        <style>
            *
            {
                text-align: center;
            }
            body{
                background-image: url("bck1.jpg");
                background-repeat: no-repeat;
                min-height:100dvh;
            }
            .content
            {
                display: grid;
                grid-template-columns: repeat(2,1fr);
                margin-right:10%;
                margin-left:10%;
                align-items: center;
                padding-bottom: 20px;
            }
            @media(min:width:768px)
            {
                .content
                {
                    grid-template-columns:repeat(3,1fr);
                }
            }
            button{
                border: none;
                box-sizing: border-box;
                background-image: linear-gradient(to bottom,dodgerblue,white);
                transition:transform 0.2s ease-in-out;
                width:90%;
                margin: 10px;
                border-radius: 10px;
            }
            button:hover
            {
                transform: scale(1.1);
            }
            img{
                width:70%;
                height: auto;
                
            }
           .description
           {
            background-image: linear-gradient(to bottom,darkblue,black);
            border-radius: 5px;
            color: white;
            box-shadow: 3px 3px 3px gray;
            font-style: italic;
           }
        </style>
    </head>
