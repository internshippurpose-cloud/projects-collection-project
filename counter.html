<!DOCTYPE html>
<html>
    <head>
        <title>Image button counter</title>
        <style>
          
            body{
                background-image: url("bck1.jpg");
                background-repeat: no-repeat;
                height: 100dvh;
            }
            .main-content
            {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
            }
            .buttons
            {
                display: flex;
                flex-direction: column;
            }
            @media screen and (min-width:800px) {
                .buttons
                {
                    display: flex;
                    flex-direction: row;
                }
                
            }
            img
            {
              height:100%;
              width:100%;
          
            }
             #btn1,#btn2,#btn3
            {
              padding: 10px;
              margin: 10px;
              height:auto;
              width:70%;
              background-color: white;
            border: 5px solid darkblue;
            }

            #btn4
            {
                border: none;
                margin: 10px;
                padding: 15px;
                background-image: linear-gradient(to bottom,dodgerblue,white);
                width: 50%;
                height: auto;
            }

            #demo
            {
                font-size: 4vh;
                font-weight: 700;
                border: 5px solid darkblue;
                padding: 10px;
                margin: 15px;
                width: 50%;
                height: auto;
            }
        </style>
        <script src="headerfootermanager.js"></script>
    </head>
    <body>
        <special-header></special-header>
        <div class="main-content">
        <h1>Image buttons counter</h1>
        <p id="demo"></p>
        <div class="buttons">
        <button id="btn1" onclick="myfunction()">
            <img src="s1.jpg">
        </button>
        <button id="btn2" onclick="myfunction()">
            <img src="s2.jpg">
        </button>
        <button id="btn3" onclick="myfunction()">
            <img src="s3.jpg">
        </button>
        </div>
        <button id="btn4" onclick="resetfunc()">Reset</button>
        </div>
        <special-footer></special-footer>
        <script>
            let count = 0;
            let p = document.getElementById("demo");
            p.innerHTML="Count will be displayed here..."
            function myfunction()
            {
                count++;
                p.innerHTML=count;
            }

            function resetfunc()
            {
                count=0;
                p.innerHTML=count;
            }
        </script>
    </body>
</html>
