<!DOCTYPE html>
<html>
    <head>
        <title>Image button counter</title>
        <style>
            *
            {
                
                text-align: center;
            }
            body{
                background-image: url("bck1.jpg");
                background-repeat: no-repeat;
            }
            div{
                display: flex;
                text-align: center;
                justify-content: center;
                align-items: center;
                padding: 10px;
                margin: 10px;
            }
            img
            {
              height:100%;
              width:100%;
              
            }
            #btn1,#btn2,#btn3
            {
              padding: 10px;
              margin: 10px;
              height: 80px;
              width: 80px;
              background-color: white;
              border: none;
            }
        </style>
        <script src="headerfootermanager.js"></script>
    </head>
    <body>
        <special-header></special-header>
        <h1>Image buttons counter</h1>
        <p id="demo"></p>
        <div class="buttons">
        <button id="btn1" onclick="myfunction()">
            <img src="s1.jpg">
        </button>
        <button id="btn2" onclick="myfunction()">
            <img src="s2.jpg">
        </button>
        <button id="btn3" onclick="myfunction()">
            <img src="s3.jpg">
        </button>
        </div>
        <button id="btn4" onclick="resetfunc()">Reset</button>
        <special-footer></special-footer>
        <script>
            let count = 0;
            let p = document.getElementById("demo");
            p.innerHTML="Count will be displayed here..."
            function myfunction()
            {
                count++;
                p.innerHTML=count;
            }

            function resetfunc()
            {
                count=0;
                p.innerHTML=count;
            }
        </script>
    </body>
</html>
